<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            padding: 0;
        }
        img {
            width: 100%;
            max-height: 595px; /* A4横向きの高さ */
            object-fit: contain;
            display: block;
        }
    </style>
</head>
<body>

    <!-- 画像を差し込む場所 -->
    <img id="pdfImage" src="">

    <script>
        // URLパラメータから画像URLを取得する
        const params = new URLSearchParams(window.location.search);
        const imageUrl = params.get("image");

        // 画像をセット
        if (imageUrl) {
            document.getElementById("pdfImage").src = imageUrl;
        }
    </script>

</body>
</html>
